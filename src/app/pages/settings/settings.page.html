<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Configurações</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-list-header>Atualização de Taxas</ion-list-header>

    <ion-item>
      <ion-label>Frequência de atualização</ion-label>
      <ion-select [(ngModel)]="settings.updateFrequency" interface="popover">
        <ion-select-option value="always">Sempre que abrir</ion-select-option>
        <ion-select-option value="hourly">A cada hora</ion-select-option>
        <ion-select-option value="daily">Diariamente</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label>Notificações de variação</ion-label>
      <ion-toggle [(ngModel)]="settings.notifications"></ion-toggle>
    </ion-item>
  </ion-list>

  <ion-button expand="block" (click)="save()" style="margin-top:16px">
    <ion-icon name="save-outline" slot="start"></ion-icon>
    Salvar Configurações
  </ion-button>
</ion-content>
