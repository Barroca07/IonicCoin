<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Histórico</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="clearAll()" *ngIf="history.length > 0">
        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list *ngIf="history.length > 0">
    <ion-item *ngFor="let item of history">
      <ion-label>
        <h2>{{ item.amount }} {{ item.from }} → {{ item.result | number:'1.2-2' }} {{ item.to }}</h2>
        <p>Taxa: 1 {{ item.from }} = {{ item.rate | number:'1.4-4' }} {{ item.to }}</p>
        <p>{{ item.date }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <div *ngIf="history.length === 0" style="text-align:center; margin-top:40px">
    <ion-icon name="time-outline" style="font-size:64px; color:#ccc"></ion-icon>
    <p style="color:#999">Nenhuma conversão realizada ainda.</p>
  </div>
</ion-content>
