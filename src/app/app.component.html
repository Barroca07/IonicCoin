<ion-app>
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>IonicCoin</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/home" routerDirection="root">
            <ion-icon name="swap-horizontal-outline" slot="start"></ion-icon>
            <ion-label>Conversão</ion-label>
          </ion-item>
          <ion-item routerLink="/history" routerDirection="root">
            <ion-icon name="time-outline" slot="start"></ion-icon>
            <ion-label>Histórico</ion-label>
          </ion-item>
          <ion-item routerLink="/settings" routerDirection="root">
            <ion-icon name="settings-outline" slot="start"></ion-icon>
            <ion-label>Configurações</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
